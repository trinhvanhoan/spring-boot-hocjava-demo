<main xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layouts/backend :: layout(
          pageTitle='Xóa người dùng',
          pageCurrent='users',
          pageContent=~{::main-content}
      )}">

	<div th:fragment="main-content">
		 <div th:replace="~{fragments/alert :: alerts}"></div>
		 <div>
		 	<form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="POST" th:object="${dto}"
		 		class="needs-validation" novalidate>
             	<label class="form-label fw-bold"><i class="fas fa-exchange-alt me-2"></i> Xử lý dữ liệu liên quan</label>
	            <p class="small text-muted mb-2">Chọn người dùng thay thế để chuyển giao:</p>
             	<select class="form-select border-secondary" th:field="*{transferId}" required>
	                 <option value="" selected>-- Chọn người dùng nhận bàn giao --</option>
	                 <th:block th:each="item:${users}">
	                 	<option th:value="${item.id}" th:text="${item.fullName}">Admin - Trần Thị B</option>
	                 </th:block>
	             </select>
	             <div class="invalid-feedback">Vui lòng chọn người dùng để chuyển giao dữ liệu.</div>
	             
	             <div class="mt-3">
	             	<button type="submit" class="btn btn-primary">Xác nhận xóa người dùng</button>
	             	<a th:href="@{/admin/users}" class="btn btn-secondary">Hủy bỏ</a>
	             </div>
             </form>
             
		 </div>
	</div>
</main>
