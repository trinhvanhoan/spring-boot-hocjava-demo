<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Java Core Master</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<style>
body {
	background-color: #f0f2f5;
	height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
}

.login-card {
	width: 100%;
	max-width: 480px;
	border: none;
	box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.brand-logo {
	font-size: 2rem;
	margin-bottom: 1rem;
	text-align: center;
}
</style>
</head>
<body>

	<div class="card login-card p-4">
		<div class="card-body">
			<div class="brand-logo">
				<i class="fa-solid fa-mug-saucer"></i> Admin Portal
			</div>
			<h5 class="text-center text-muted mb-4">Đăng nhập hệ thống</h5>
			<div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
				<i class="fa fa-warning me-2"></i> Không đúng user name hoặc mật khẩu
			</div>
			<form th:action="@{/login}" method="post">
				<div class="mb-3">
					<label for="username" class="form-label">Tài khoản</label> <input type="text" class="form-control" id="username"
						name="username" required>
				</div>
				<div class="mb-3">
					<label for="password" class="form-label">Mật khẩu</label> <input type="password" class="form-control" id="password"
						name="password" required>
				</div>

				<div class="form-check mb-3">
					<input class="form-check-input" type="checkbox" id="rememberMe" name="remember-me"> <label
						class="form-check-label" for="rememberMe">Ghi nhớ đăng nhập</label>
				</div>

				<button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
			</form>
		</div>
		<div class="card-footer text-center bg-white border-0 mt-3">
			<small class="text-muted">&copy; 2026 Java Master System</small>
		</div>
	</div>
</body>
</html>
