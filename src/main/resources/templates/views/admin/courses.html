<main xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layouts/backend :: layout(
          pageTitle='Quản lý khóa học',
          pageCurrent='courses',
          pageAction=~{::page-action},
          pageContent=~{::main-content},
          pageFoot=~{::page-foot}
      )}">
	
	<div th:fragment="page-action">
		<button class="btn btn-primary" data-bs-toggle="modal" 
    		data-bs-target="#mainModal"
    		data-modal-size="lg"
    		th:data-modal-url="@{/admin/courses/new}">
             <i class="fa-solid fa-plus me-1"></i> Thêm khóa học
         </button>
    </div>
    
	<div th:fragment="main-content">
		<div th:replace="~{fragments/alert :: alerts}"></div>
		<div class="card shadow-sm mb-4">
            <div class="card-header bg-white py-3">
                <div class="row g-3 align-items-center">
                    <div class="col">
                        <h5 class="mb-0 text-primary"><i class="fas fa-list me-2"></i>Danh sách khóa học</h5>
                    </div>
                </div>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th scope="col">#ID</th>
                            <th scope="col">Tên khóa học</th>
                            <th scope="col" class="text-end">Chức năng</th>
                        </tr>
                        </thead>
                        <tbody th:each="item:${courses}">
                        <tr>
                            <td th:text="${item.id}"></td>
                            <td class="fw-bold" th:text="${item.courseName}">Java cơ bản</td>
                            <td class="text-end">
                                <a href="#" class="btn btn-sm btn-outline-primary" title="Sửa/Xem"
                        	 data-modal-size="lg"
                           data-bs-toggle="modal" data-bs-target="#mainModal" 
                           th:data-modal-url="@{/admin/courses/{id}/edit(id=${item.id})}">
                           	<i class="fas fa-edit"></i>
                          	</a>
                           	
                                <a th:href="@{/admin/courses/{id}/delete(id=${item.id})}"
                            class="btn btn-sm btn-outline-danger" title="Xóa"
                            data-bs-toggle="modal" data-bs-target="#deleteModal"
                            data-pre-message="khóa học"
                            th:data-message="${item.courseName}"><i class="fas fa-trash-alt"></i></a>
                            </td>
                        </tr>
                        
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

	</div>
	<div th:fragment="page-foot">
		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	</div>
</main>
