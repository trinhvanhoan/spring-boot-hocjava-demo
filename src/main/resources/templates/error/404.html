<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/images/favicon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body class="error-page">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 error-container">
            <h1 class="error-code">404</h1>

            <h2 class="mb-3 fw-bold">Rất tiếc! Trang bạn tìm không tồn tại.</h2>
            <p class="text-muted mb-5">
                Có vẻ như liên kết này đã bị hỏng hoặc trang đã được di chuyển đi nơi khác. <br>
                Đừng lo lắng, hãy thử quay lại trang chủ hoặc tìm kiếm nội dung khác.
            </p>

            <div class="d-flex justify-content-center gap-3">
                <a th:href="@{/}" class="btn btn-primary btn-home shadow-sm">
                    Quay về trang chủ
                </a>
                <a th:href="@{/contact}" class="btn btn-outline-secondary btn-home">
                    Liên hệ
                </a>
            </div>

        </div>
        <div class="text-center">
            <p class="mb-0">&copy; 2026 Java Master. All rights reserved.</p>
        </div>
    </div>
</div>
</body>
