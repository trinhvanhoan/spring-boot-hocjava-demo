<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	th:fragment="layout(title, content)"
	th:with="head=${head} ?: '', 
			 foot=${foot} ?: '',
			 currentPage=${currentPage} ?: ''">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${title + ' - Java Master' }"></title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" th:href="@{/assets/css/style.css}">
<th:block th:if="${head != ''}">
	<th:block th:replace="${head}"></th:block>
</th:block>
</head>

<body>
	 <header>
		<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
			<div class="container">
				<a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/}">
					<img th:src="@{/assets/images/logo-svg.svg}" width="40" height="40" class="me-2" alt="Logo">
					<span class="text-primary fs-3">Java Master</span>
				</a>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav ms-auto">
						<li class="nav-item"><a class="nav-link px-3" th:classappend="${currentPage=='home' ? 'active' : ''}" th:href="@{/}">Trang chủ</a></li>
						<li class="nav-item"><a class="nav-link px-3" th:classappend="${currentPage=='about' ? 'active' : ''}" th:href="@{/about}">Giới thiệu</a></li>
						<li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link px-3" th:href="@{/admin}">Admin Panel</a></li>
						<li class="nav-item"><a class="btn btn-primary px-4 rounded-pill shadow-sm ms-3" th:classappend="${currentPage=='contact' ? 'active' : ''}" th:href="@{/contact}">Liên hệ ngay</a></li>
					</ul>
				</div>
			</div>
		</nav>
	</header>

	<main class="content">
		<div th:replace="${content}">
			<!-- Nội dung -->
		</div>
	</main>
	
	<footer class="bg-dark text-light py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 Java Core Master. All rights reserved.</p>
        </div>
    </footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	
	<th:block th:if="${foot != ''}">
		<th:block th:replace="${foot}"></th:block>
	</th:block>
	
	<script th:src="@{/assets/js/app.js}"></script>
</body>
</html>
