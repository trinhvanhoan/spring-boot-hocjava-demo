<main xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layouts/backend :: layout(
          pageTitle='Tháng hiện tại',
          pageCurrent='stats-month',
          pageContent=~{::main-content},
          pageFoot=~{::page-foot}
      )}">

	<div th:fragment="main-content">
		<div class="row">
			<div class="col-lg-7">
				<div class="card shadow-sm border-0 mb-4">
					<div class="card-body">
						<h6 class="fw-bold mb-3">Lượng quan tâm theo khóa học</h6>
						<canvas class="chart" style="height: 430px" th:data-options="${pageInfo.courseSummaryJson}"></canvas>
					</div>
				</div>
			</div>

			<div class="col-lg-5">
				<div class="card shadow-sm mb-4" style="min-height: 490px;">
					<div class="card-header bg-white py-3">
						<h5 class="m-0 fw-bold">
							<i class="fas fa-list me-2"></i>Hiệu suất tháng này
						</h5>
					</div>
					<div class="card-body">
						<div class="table-responsive">
							<table class="table table-sm align-middle">
								<thead>
									<tr>
										<th>Admin</th>
										<th class="text-center">Xử lý</th>
										<th>Tỷ lệ</th>
									</tr>
								</thead>
								<tbody th:each="item:${pageInfo.userStats}">
									<tr>
										<td th:text="${item.fullName}"></td>
										<td class="text-center" th:text="${item.processedCount}"></td>
										<td>
											<div class="progress" style="height: 8px;">
												<div class="progress-bar bg-success" th:style="|width: ${item.processedCount * 100 / pageInfo.totalProcessByMonth}%|"></div>
											</div>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="card shadow-sm">
			<div class="card-header bg-white py-3">
				<h5 class="m-0 fw-bold">
					<i class="fas fa-list me-2"></i>10 Yêu cầu mới nhất trong tháng
				</h5>
			</div>
			<div class="card-body p-0">
				<table class="table table-hover align-middle mb-0">
					<thead class="small text-uppercase bg-light">
						<tr>
							<th>Ngày</th>
							<th>Học viên</th>
							<th>Khóa học</th>
							<th>Trạng thái</th>
						</tr>
					</thead>
					<tbody class="small" th:each="item:${pageInfo.contacts}">
						<tr>
							<td>
								<div th:text="${#temporals.format(item.createdAt, 'dd/MM/yyyy')}"></div>
								<small th:text="|vào lúc ${#temporals.format(item.createdAt, 'HH:mm')}|"></small>
							</td>
							<td th:text="${item.fullName}"></td>
							<td th:text="${item.course.courseName}">Spring Boot Master</td>
							<td th:switch="${item.status?.toString()}">
								<span th:case="pending" class="badge bg-primary">Mới</span>
								<span th:case="processing" class="badge bg-warning">Đang xử lý</span>
								<span th:case="done" class="badge bg-success">Đã xử lý</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

	</div>
	<div th:fragment="page-foot">
		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	</div>
</main>
