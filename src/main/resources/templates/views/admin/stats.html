<main xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layouts/backend :: layout(
          pageTitle='Thống kê tổng quát',
          pageCurrent='stats',
          pageContent=~{::main-content},
          pageFoot=~{::page-foot}
      )}">

	<div th:fragment="main-content">
		<div class="row g-3 mb-4">
			<div class="col-md-3">
				<div class="card text-white bg-primary h-100">
					<div class="card-body d-flex justify-content-between align-items-center">
						<div>
							<h6 class="card-title">Tổng yêu cầu</h6>
							<h2 class="mb-0" th:text="${pageInfo.contactSummary.totalCount}"></h2>
						</div>
						<i class="fas fa-users fa-2x opacity-50"></i>
					</div>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card text-white bg-warning h-100">
					<div class="card-body d-flex justify-content-between align-items-center">
						<div>
							<h6 class="card-title">Chưa xử lý (New)</h6>
							<h2 class="mb-0" th:text="${pageInfo.contactSummary.pendingCount}"></h2>
						</div>
						<i class="fas fa-exclamation-circle fa-2x opacity-50"></i>
					</div>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card text-white bg-success h-100">
					<div class="card-body d-flex justify-content-between align-items-center">
						<div>
							<h6 class="card-title">Đã hoàn thành</h6>
							<h2 class="mb-0" th:text="${pageInfo.contactSummary.doneCount}"></h2>
						</div>
						<i class="fas fa-check-circle fa-2x opacity-50"></i>
					</div>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card text-white bg-info h-100">
					<div class="card-body d-flex justify-content-between align-items-center">
						<div>
							<h6 class="card-title">Tổng số khóa học</h6>
							<h2 class="mb-0" th:text="${pageInfo.totalCourse}"></h2>
						</div>
						<i class="fas fa-book fa-2x opacity-50"></i>
					</div>
				</div>
			</div>
		</div>
		
		<div class="row">
            <div class="col-xl-8 col-lg-7">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white py-3 d-flex align-items-center justify-content-between">
                        <h6 class="m-0 fw-bold text-primary">Xu hướng yêu cầu tư vấn (6 tháng qua)</h6>
                    </div>
                    <div class="card-body">
                        <canvas class="chart" style="height: 350px;" th:data-options="${pageInfo.trendingJson}"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-xl-4 col-lg-5">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white py-3">
                        <h6 class="m-0 fw-bold text-primary">Cơ cấu trạng thái</h6>
                    </div>
                    <div class="card-body">
                        <canvas class="chart" style="height: 300px;" th:data-options="${pageInfo.statusSummaryJson}"></canvas>
                    </div>
                </div>
            </div>
        </div>

	</div>
	<div th:fragment="page-foot">
		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	</div>
</main>
