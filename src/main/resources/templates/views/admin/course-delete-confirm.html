<main xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layouts/backend :: layout(
          pageTitle='Xóa khóa học',
          pageCurrent='courses',
          pageContent=~{::main-content}
      )}">

	<div th:fragment="main-content">
		 <div th:replace="~{fragments/alert :: alerts}"></div>
		 <div>
		 	<form th:action="@{/admin/courses/{id}/delete(id=${course.id})}" method="POST" th:object="${dto}"
		 		class="needs-validation" novalidate>
             	<label class="form-label fw-bold"><i class="fas fa-exchange-alt me-2"></i> Xử lý dữ liệu liên quan</label>
	            <p class="small text-muted mb-2">Chọn khóa học thay thế để chuyển giao:</p>
             	<select class="form-select border-secondary" th:field="*{transferId}" required>
	                 <option value="" selected>-- Chọn khóa học --</option>
	                 <th:block th:each="item:${courses}">
	                 	<option th:value="${item.id}" th:text="${item.courseName}"></option>
	                 </th:block>
	             </select>
	             <div class="invalid-feedback">Vui lòng chọn khóa học để chuyển giao dữ liệu.</div>
	             
	             <div class="mt-3">
	             	<button type="submit" class="btn btn-primary">Xác nhận xóa khóa học</button>
	             	<a th:href="@{/admin/courses}" class="btn btn-secondary">Hủy bỏ</a>
	             </div>
             </form>
		 </div>
	</div>
</main>
