<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Truy cập bị từ chối</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .error-code { font-size: 150px; font-weight: 800; color: #dc3545; line-height: 1; }
        .error-title { font-size: 2rem; font-weight: 700; color: #212529; }
        .error-desc { color: #6c757d; max-width: 570px; margin: 0 auto; }
        .btn-home { background-color: #5850ec; border-color: #5850ec; padding: 10px 25px; }
        .btn-home:hover { background-color: #4338ca; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="error-code">403</div>
        <h1 class="error-title mt-4">Dừng lại! Bạn không có quyền.</h1>
        <p class="error-desc mt-3">
            Có vẻ như bạn đang cố gắng truy cập vào khu vực bị hạn chế. 
            Nếu bạn tin rằng đây là một nhầm lẫn, vui lòng liên hệ với quản trị viên hệ thống.
        </p>
        <div class="mt-5">
            <a th:href="@{/}" class="btn btn-primary btn-home me-2">Quay về trang chủ</a>
            <a th:href="@{/contact}" class="btn btn-outline-secondary px-4 py-2">Liên hệ trợ giúp</a>
        </div>
        <footer class="mt-5 text-muted small">
            © 2026 Java Master. All rights reserved.
        </footer>
    </div>
</body>
</html>
