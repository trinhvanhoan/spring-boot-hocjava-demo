<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đã có lỗi xảy ra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .error-icon { font-size: 100px; color: #6c757d; }
        .error-title { font-size: 2rem; font-weight: 700; color: #212529; }
        .error-desc { color: #6c757d; max-width: 550px; margin: 0 auto; }
        .btn-home { background-color: #5850ec; border-color: #5850ec; padding: 10px 25px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="error-icon"><i class="bi bi-exclamation-triangle"></i>⚠️</div>
        <h1 class="error-title mt-3">Ối! Đã có lỗi xảy ra.</h1>
        <p class="error-desc mt-3">
            Hệ thống đang gặp sự cố kỹ thuật tạm thời. Chúng tôi đã ghi nhận lỗi này 
            và đang tiến hành khắc phục nhanh nhất có thể.
        </p>
        
        <div th:if="${message}" class="mt-4 p-3 bg-white rounded border shadow-sm mx-auto fst-italic text-muted" style="max-width: 600px;">
            <small>Chi tiết: <span th:text="${message}">Thông tin lỗi</span></small>
        </div>

        <div class="mt-5">
            <a href="/" class="btn btn-primary btn-home">Quay về trang chủ</a>
            <button onclick="location.reload()" class="btn btn-outline-secondary px-4 py-2 ms-2">Thử lại</button>
        </div>
        <footer class="mt-5 text-muted small">
            © 2026 Java Core Master. All rights reserved.
        </footer>
    </div>
</body>
</html>
