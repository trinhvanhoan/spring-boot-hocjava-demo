<div xmlns:th="http://www.thymeleaf.org">
	<div class="modal-header">
		<h5 class="modal-title">Đặt mật khẩu cho: <strong th:text="${user.fullName}"></strong></h5>
		<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
	</div>
	<form class="ajax-form needs-validation" novalidate th:object="${dto}" th:action="@{/admin/users/{id}/set-password(id=${user.id})}" method="POST">
		<div class="modal-body">
			<div th:replace="~{fragments/alert :: alerts}"></div>
			
			<!-- Password -->
			<div>
				<label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
				<input type="password"
					   class="form-control"
					   th:field="*{password}"
					   minlength="8"
					   maxlength="20"
					   pattern="^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=!])(?=\S+$).{8,}$"
					   required>
				<div class="invalid-feedback">
					Mật khẩu chưa đúng yêu cầu!
				</div>
				<div class="form-text fst-italic">
				    Mật khẩu ≥ 8 ký tự, gồm chữ hoa, thường, số và ký tự đặc biệt
				</div>
				
			</div>
		</div>
	
		<div class="modal-footer">
			<button type="submit" class="btn btn-primary">Đặt mật khẩu</button>
			<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
		</div>
	</form>
</div>
