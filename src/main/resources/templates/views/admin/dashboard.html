<main xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layouts/backend :: layout(
          pageTitle='Tổng quan',
          pageCurrent='dashboard',
          pageContent=~{::main-content},
          pageFoot=~{::page-foot}
      )}">

	<div th:fragment="main-content">
		<div class="row g-3 mb-4">
			<div class="col-md-3">
				<div class="card text-white bg-primary h-100">
					<div class="card-body d-flex justify-content-between align-items-center">
						<div>
							<h6 class="card-title">Tổng yêu cầu</h6>
							<h2 class="mb-0" th:text="${pageInfo.contactSummary.totalCount}"></h2>
						</div>
						<i class="fas fa-users fa-2x opacity-50"></i>
					</div>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card text-white bg-warning h-100">
					<div class="card-body d-flex justify-content-between align-items-center">
						<div>
							<h6 class="card-title">Chưa xử lý (New)</h6>
							<h2 class="mb-0" th:text="${pageInfo.contactSummary.pendingCount}"></h2>
						</div>
						<i class="fas fa-exclamation-circle fa-2x opacity-50"></i>
					</div>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card text-white bg-success h-100">
					<div class="card-body d-flex justify-content-between align-items-center">
						<div>
							<h6 class="card-title">Đã hoàn thành</h6>
							<h2 class="mb-0" th:text="${pageInfo.contactSummary.doneCount}"></h2>
						</div>
						<i class="fas fa-check-circle fa-2x opacity-50"></i>
					</div>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card text-white bg-info h-100">
					<div class="card-body d-flex justify-content-between align-items-center">
						<div>
							<h6 class="card-title">Tổng số khóa học</h6>
							<h2 class="mb-0" th:text="${pageInfo.totalCourse}"></h2>
						</div>
						<i class="fas fa-book fa-2x opacity-50"></i>
					</div>
				</div>
			</div>
		</div>

		<div class="row g-4">
			<div class="col-lg-8">
				<div class="card shadow-sm p-4 h-100">
					<h5 class="fw-bold mb-4">Liên hệ trong tuần</h5>
					<canvas class="chart" style="max-height: 350px;" th:data-options="${pageInfo.chartJson}"></canvas>
				</div>
			</div>

			<div class="col-lg-4">
				<div class="card shadow-sm p-4 h-100">
					<h5 class="fw-bold mb-4">Liên hệ mới nhất</h5>
					<div class="activity-list" th:each="contact:${pageInfo.lastContacts}">
						<div class="d-flex align-items-start mb-3 pb-3 border-bottom">
							<div class="bg-light p-2 rounded me-3">
								<i class="fa-solid fa-user text-primary"></i>
							</div>
							<div>
								<div class="fw-bold small" th:text="${contact.fullName}"></div>
								<div class="text-muted x-small" th:text="${contact.course?.courseName}"></div>
								<div class="text-primary x-small" th:text="${contact.relativeTime}"></div>
							</div>
						</div>
						
					</div>
					<a th:href="@{/admin/contacts}" class="btn btn-light w-100 mt-4 btn-sm">Xem tất cả liên hệ</a>
				</div>
			</div>
		</div>
	</div>
	<div th:fragment="page-foot">
		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	</div>
</main>
