<div xmlns:th="https://www.thymeleaf.org" th:fragment="pagination(page, url)" class="my-3">
    <nav th:if="${page.totalPages > 1}">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link" th:href="@{${url}(page=${page.number - 1}, size=${page.size})}" title="Trang trước">&laquo;</a>
            </li>

            <th:block th:with="total=${page.totalPages}, current=${page.number}">
                <th:block th:each="i : ${#numbers.sequence(0, total - 1)}">
                    
                    <li th:if="${i < 2 or i > total - 3 or (i >= current - 1 and i <= current + 1)}"
                        class="page-item" th:classappend="${i == current} ? 'active'">
                        <a class="page-link" th:href="@{${url}(page=${i}, size=${page.size})}" th:text="${i + 1}"></a>
                    </li>

                    <li th:if="${i == 2 and current > 3}" class="page-item disabled">
                        <span class="page-link">...</span>
                    </li>

                    <li th:if="${i == total - 3 and current < total - 4}" class="page-item disabled">
                        <span class="page-link">...</span>
                    </li>
                    
                </th:block>
            </th:block>

            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link" th:href="@{${url}(page=${page.number + 1}, size=${page.size})}" title="Trang sau">&raquo;</a>
            </li>

        </ul>
    </nav>
</div>
