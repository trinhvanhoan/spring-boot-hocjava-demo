<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Lỗi hệ thống</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/images/favicon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body class="error-page">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 error-container">
            <h1 class="error-code">500</h1>

            <h2 class="mb-3 fw-bold text-dark">Xin lỗi! Đã có lỗi xảy ra từ phía chúng tôi.</h2>
            <p class="text-muted mb-4">
                Máy chủ đang gặp một chút sự cố kỹ thuật ngoài ý muốn. <br>
                Đội ngũ kỹ thuật đã được thông báo và đang tiến hành khắc phục ngay lập tức.
            </p>

            <div class="d-flex justify-content-center gap-3">
                <button onclick="location.reload()" class="btn btn-warning btn-action shadow-sm text-white">
                    Thử tải lại trang
                </button>
                <a th:href="@{/}" class="btn btn-outline-dark btn-action">
                    Về trang chủ
                </a>
            </div>
            <div th:if="${message}" class="mt-4 p-3 bg-white rounded border shadow-sm mx-auto fst-italic text-muted" style="max-width: 600px;">
	            <small>Chi tiết: <span th:text="${message}">Thông tin lỗi</span></small>
	        </div>
	        
        </div>
    </div>
</div>
</body>
</html>
