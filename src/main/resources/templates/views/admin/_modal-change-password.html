<div xmlns:th="http://www.thymeleaf.org">
	<div class="modal-header">
		<h5 class="modal-title">Đổi mật khẩu</h5>
		<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
	</div>
	<form class="ajax-form needs-validation" novalidate th:object="${dto}" th:action="@{/admin/profile/change-password}" method="POST">
		<input type="hidden" th:field="*{id}">
		<div class="modal-body">
			<div th:replace="~{fragments/alert :: alerts}"></div>
			
			<div class="mt-3">
				<label class="form-label">Mật khẩu cũ <span class="text-danger">*</span></label>
				<input type="password"
					   class="form-control"
					   th:field="*{oldPassword}"
					   required>
				<div class="invalid-feedback">
					Chưa nhập mật khẩu cũ!
				</div>			
			</div>
			<div class="mt-3">
				<label class="form-label">Mật khẩu mới <span class="text-danger">*</span></label>
				<input type="password"
					   class="form-control"
					   th:field="*{newPassword}"
					   minlength="8"
					   maxlength="20"
					   pattern="^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=!])(?=\S+$).{8,}$"
					   required>
				<div class="invalid-feedback">
					Mật khẩu chưa đúng yêu cầu!
				</div>
				<div class="form-text fst-italic">
				    Mật khẩu ≥ 8 ký tự, gồm chữ hoa, thường, số và ký tự đặc biệt
				</div>
			</div>
			
			<div class="mt-3">
				<label class="form-label">Nhập lại mật khẩu <span class="text-danger">*</span></label>
				<input type="password"
					   class="form-control"
					   th:field="*{confirmPassword}"
					   data-match-field="newPassword">
				<div class="invalid-feedback">
					Nhập lại mật khẩu chưa trùng khớp!
				</div>			
			</div>
		</div>
	
		<div class="modal-footer">
			<button type="submit" class="btn btn-primary">Đổi mật khẩu</button>
			<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
		</div>
	</form>
</div>
